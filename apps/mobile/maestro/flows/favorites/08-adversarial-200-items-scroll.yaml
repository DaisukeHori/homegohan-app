appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# Adversarial 08: 無限スクロールでクラッシュしない
- runFlow: ../_shared/login.yaml

# マイページ経由でお気に入り画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- tapOn:
    id: "profile-favorites-link"
- extendedWaitUntil:
    visible:
      id: "favorites-screen"
    timeout: 10000

# スクロール操作
- scroll
- scroll
- scroll

# アプリがクラッシュしないことを確認
- assertVisible:
    id: "favorites-screen"
