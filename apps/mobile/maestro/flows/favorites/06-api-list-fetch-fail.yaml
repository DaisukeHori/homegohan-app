appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# API 06: 一覧取得 (API 異常系)
# NOTE: setAirplaneMode 非対応のため、お気に入り画面の基本表示のみ確認
- runFlow: ../_shared/login.yaml

# マイページ経由でお気に入り画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- tapOn:
    id: "profile-favorites-link"
- extendedWaitUntil:
    visible:
      id: "favorites-screen"
    timeout: 10000

# データ読み込み完了を待機
- waitForAnimationToEnd:
    timeout: 10000

# お気に入り画面が表示されていることを確認
- assertVisible:
    id: "favorites-screen"
