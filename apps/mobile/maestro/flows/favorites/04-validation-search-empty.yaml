appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# バリデーション 04: 検索空 → 全件表示
- runFlow: ../_shared/login.yaml

# お気に入りタブへ移動
- tapOn:
    id: "tab-favorites"
- extendedWaitUntil:
    visible:
      id: "favorites-screen"
    timeout: 10000

# 検索入力
- tapOn:
    id: "favorites-search-input"
- inputText: "検索テスト"
- waitForAnimationToEnd:
    timeout: 5000

# 検索をクリア (eraseText で削除)
- tapOn:
    id: "favorites-search-input"
- eraseText: 10

# 全件表示に戻ることを確認
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    id: "favorites-screen"
