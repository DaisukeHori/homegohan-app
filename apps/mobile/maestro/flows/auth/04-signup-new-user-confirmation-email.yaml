appId: com.homegohan.app
env:
  E2E_NEW_USER_EMAIL: ${E2E_USER_04_EMAIL}
  E2E_NEW_USER_PASSWORD: ${E2E_USER_04_PASSWORD}
---
# 04: /signup で新規登録 → 確認メール送信 Alert
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- assertVisible:
    text: "ほめゴハン"
- tapOn:
    text: "新規登録"
- assertVisible:
    id: "signup-screen"
- tapOn:
    id: "signup-email-input"
- eraseText: 50
- inputText: ${E2E_NEW_USER_EMAIL}
- tapOn:
    id: "signup-password-input"
- eraseText: 50
- inputText: ${E2E_NEW_USER_PASSWORD}
- tapOn:
    id: "signup-button"
- extendedWaitUntil:
    visible:
      text: "確認してください"
    timeout: 10000
- assertVisible:
    text: "確認メールを送信しました"
