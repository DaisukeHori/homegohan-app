appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_05_EMAIL}
---
# 18: password に SQL injection → クラッシュしないこと、DBエラーにならないこと
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "' OR '1'='1'; DROP TABLE users; --"
- tapOn:
    id: "login-button"
# 認証エラーになること (ログインできないこと)
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 10000
- assertNotVisible:
    id: "home-screen"
- assertVisible:
    id: "login-screen"
