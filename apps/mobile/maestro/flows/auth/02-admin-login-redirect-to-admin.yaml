appId: com.homegohan.app
env:
  E2E_ADMIN_EMAIL: ${E2E_ADMIN_EMAIL}
  E2E_ADMIN_PASSWORD: ${E2E_ADMIN_PASSWORD}
---
# 02: admin ロールで login → /admin に redirect
# 前提: 前のフロー後にホーム画面にいる可能性があるため、まずログアウト
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
# ホーム画面にいる場合はログアウトして welcome に戻る
- runFlow:
    when:
      visible:
        id: "home-screen"
    file: "../_shared/logout.yaml"
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_ADMIN_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_ADMIN_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "Admin Console"
    timeout: 30000
- assertNotVisible:
    id: "home-screen"
