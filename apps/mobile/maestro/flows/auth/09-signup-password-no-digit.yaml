appId: com.homegohan.app
---
# 09: signup: password 数字無し → バリデーションエラー
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "新規登録"
- assertVisible:
    text: "はじめまして！"
- tapOn:
    id: "signup-email-input"
- eraseText: 50
- inputText: "test.nodigit@example.com"
- tapOn:
    id: "signup-password-input"
- eraseText: 50
- inputText: "PasswordOnly"
- tapOn:
    id: "signup-button"
- extendedWaitUntil:
    visible:
      text: "入力エラー"
    timeout: 5000
# signup 画面に留まっていること (入力エラー確認済み)
- tapOn:
    text: "OK"
- assertVisible:
    id: "signup-screen"
