appId: com.homegohan.app
---
# 09: signup: password 数字無し → バリデーションエラー
- launchApp:
    clearState: true
- tapOn:
    text: "新規登録"
- assertVisible:
    text: "はじめまして！"
- tapOn:
    text: "email@example.com"
- inputText: "test.nodigit@example.com"
- tapOn:
    text: "8文字以上・英字と数字を含む"
- inputText: "PasswordOnly"
- tapOn:
    text: "アカウント作成"
- extendedWaitUntil:
    visible:
      text: "入力エラー"
    timeout: 5000
- assertVisible:
    text: "パスワードには数字を含めてください"
# signup 画面に留まっていること
- assertVisible:
    text: "はじめまして！"
