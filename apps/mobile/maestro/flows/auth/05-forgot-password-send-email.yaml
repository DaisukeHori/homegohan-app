appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_05_EMAIL}
---
# 05: forgot-password で email 入力 → 送信完了 banner
- launchApp
- assertVisible:
    text: "ほめゴハン"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    text: "パスワードを忘れた？"
- assertVisible:
    text: "パスワードを忘れた"
- tapOn:
    text: "email@example.com"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    text: "送信"
- extendedWaitUntil:
    visible:
      text: "送信しました"
    timeout: 10000
- assertVisible:
    text: "パスワード再設定用のメールを送信しました"
