appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_08_EMAIL}
---
# 08: login: password 7 字で submit → クライアント側エラーまたは API エラー
# Note: login 画面はパスワード長チェックをしないが signup 側でバリデーション済み
# ここでは 7 文字パスワードで API エラー (Invalid login credentials) を確認
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "Pass123"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 10000
- assertVisible:
    id: "login-screen"
