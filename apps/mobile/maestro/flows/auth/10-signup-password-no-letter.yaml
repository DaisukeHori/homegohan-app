appId: com.homegohan.app
---
# 10: signup: password 英字無し → バリデーションエラー
- launchApp
- tapOn:
    text: "新規登録"
- assertVisible:
    text: "はじめまして！"
- tapOn:
    text: "email@example.com"
- inputText: "test.noletter@example.com"
- tapOn:
    text: "8文字以上・英字と数字を含む"
- inputText: "12345678"
- tapOn:
    text: "アカウント作成"
- extendedWaitUntil:
    visible:
      text: "入力エラー"
    timeout: 5000
- assertVisible:
    text: "パスワードには英字を含めてください"
# signup 画面に留まっていること
- assertVisible:
    text: "はじめまして！"
