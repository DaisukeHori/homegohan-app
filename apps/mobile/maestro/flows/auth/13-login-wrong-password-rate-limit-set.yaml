appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_09_EMAIL}
---
# 13: login: 誤パスワード → rate limit セット確認
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "WrongPassword99"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 10000
- tapOn:
    text: "OK"
# rate limit カウントダウンバナーが表示されること
- extendedWaitUntil:
    visible:
      id: "login-rate-limit-banner"
    timeout: 5000
- assertVisible:
    id: "login-screen"
