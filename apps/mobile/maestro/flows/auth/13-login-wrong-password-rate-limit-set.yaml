appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_09_EMAIL}
---
# 13: login: 誤パスワード → rate limit セット確認
- launchApp
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "WrongPassword99"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 10000
# エラーメッセージが表示されること
- assertVisible:
    text: "メールアドレスまたはパスワードが正しくありません"
- tapOn:
    text: "OK"
# rate limit カウントダウンが開始されること
- assertVisible:
    text: "再試行まで"
- assertVisible:
    id: "login-screen"
