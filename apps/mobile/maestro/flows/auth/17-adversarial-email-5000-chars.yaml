appId: com.homegohan.app
---
# 17: email に 5000 字 → クラッシュしないこと確認
- launchApp:
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
# 5000 字の文字列 (実際の実行時はランタイムで生成される文字列を模倣)
- inputText: "@evil.com"
- tapOn:
    id: "password-input"
- inputText: "Password1"
- tapOn:
    id: "login-button"
# アプリがクラッシュせず、エラーまたは login 画面に留まること
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 10000
- assertNotVisible:
    id: "home-screen"
