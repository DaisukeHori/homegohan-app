appId: com.homegohan.app
env:
  E2E_EXISTING_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_NEW_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 11: signup: 既存 email 重複 → silent-success 検出 (#533)
# Supabase は重複メールで identities: [] を返し、アプリがそれを検出してエラー表示
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "新規登録"
- assertVisible:
    text: "はじめまして！"
- tapOn:
    id: "signup-email-input"
- eraseText: 50
- inputText: ${E2E_EXISTING_EMAIL}
- tapOn:
    id: "signup-password-input"
- eraseText: 50
- inputText: ${E2E_NEW_PASSWORD}
- tapOn:
    id: "signup-button"
- extendedWaitUntil:
    visible:
      text: "登録できませんでした"
    timeout: 10000
- tapOn:
    text: "ログインへ"
- assertVisible:
    id: "login-screen"
