appId: com.homegohan.app
---
# 21: forgot-password: 存在しない email
# Supabase の resetPasswordForEmail は存在しない email でも成功を返す (ユーザー列挙防止)
# アプリが送信完了メッセージを表示すること (エラーにしないこと)
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    text: "パスワードを忘れた？"
- assertVisible:
    text: "パスワードを忘れた"
- tapOn:
    id: "forgot-email-input"
- eraseText: 50
- inputText: "nonexistent.user.12345@example.com"
- tapOn:
    id: "forgot-submit-button"
- extendedWaitUntil:
    visible:
      text: "送信しました"
    timeout: 10000
- tapOn:
    text: "OK"
# 送信完了メッセージが表示されること (存在確認ができないこと)
- extendedWaitUntil:
    visible:
      id: "forgot-success-text"
    timeout: 5000
