appId: com.homegohan.app
---
# 07: login: email 空で submit → バリデーションエラー
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
# email を空のまま password だけ入力
- tapOn:
    id: "password-input"
- inputText: "Password1"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "入力エラー"
    timeout: 5000
# ログイン画面に留まっていること
- assertVisible:
    id: "login-screen"
