appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_02_EMAIL}
---
# 15: login: 429 too many requests
# Supabase が 429 を返した場合のエラーハンドリング確認
# Note: テスト環境では rate limit を意図的に超過させるか、
#       mock server で 429 を返すシナリオを想定
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "WrongPass1"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 15000
- tapOn:
    text: "OK"

# 429 または通常エラーで rate limit が発動すること
- assertVisible:
    id: "login-screen"
- extendedWaitUntil:
    visible:
      id: "login-rate-limit-banner"
    timeout: 5000
