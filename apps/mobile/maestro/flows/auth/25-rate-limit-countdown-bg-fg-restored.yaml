appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_10_EMAIL}
---
# 25: rate limit countdown 中に BG → FG → 残り秒復元 (#532)
# AsyncStorage から残り制限時間を復元する機能のテスト
- launchApp:
    clearState: true
- tapOn:
    text: "ログイン"
- assertVisible:
    id: "login-screen"

# 失敗してrate limit を発動
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: "WrongPass1"
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      text: "ログイン失敗"
    timeout: 10000
- tapOn:
    text: "OK"

# rate limit カウントダウン確認
- extendedWaitUntil:
    visible:
      text: "再試行まで"
    timeout: 5000

# バックグラウンドへ
- pressKey: HOME

# 少し待機 (3秒)
- extendedWaitUntil:
    visible:
      text: "HOME"
    timeout: 1000

# フォアグラウンドへ復帰
- launchApp:
    clearState: false

# login-screen が表示されていること
- assertVisible:
    id: "login-screen"

# rate limit カウントダウンが復元されていること (AsyncStorage から読み込み)
- assertVisible:
    text: "再試行まで"
