appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_04_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_04_PASSWORD}
---
# 04: 30秒チェックインフローの確認
- runFlow: ../_shared/login.yaml
- assertVisible:
    id: "home-screen"
- scrollTo:
    id: "home-checkin-section"
- assertVisible:
    id: "home-checkin-section"
- tapOn:
    id: "checkin-start-button"
- extendedWaitUntil:
    visible:
      id: "checkin-modal"
    timeout: 8000
# 気分スライダーを操作
- assertVisible:
    id: "checkin-mood-slider"
- swipe:
    start:
      id: "checkin-mood-slider"
    direction: RIGHT
    duration: 500
# エネルギーレベル選択
- tapOn:
    id: "checkin-energy-high"
# チェックイン送信
- tapOn:
    id: "checkin-submit-button"
- extendedWaitUntil:
    visible:
      id: "checkin-success-message"
    timeout: 10000
- assertVisible:
    id: "checkin-success-message"
