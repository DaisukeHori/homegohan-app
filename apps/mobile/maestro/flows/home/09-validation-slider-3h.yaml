appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_09_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_09_PASSWORD}
---
# 09: チェックインモーダルを開いて送信ボタンが表示されること
# NOTE: チェックインスライダーの testID は未実装のため、モーダル表示確認に変更
- runFlow: ../_shared/login.yaml
- assertVisible:
    id: "home-screen"

# チェックインボタンにスクロール (複数回スクロールが必要な場合あり)
- scrollUntilVisible:
    element:
      id: "home-checkin-button"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "home-checkin-button"

# チェックインフォームが展開されるのを待機
- waitForAnimationToEnd:
    timeout: 5000

# 送信ボタンが見えるまでスクロール
- scrollUntilVisible:
    element:
      id: "home-checkin-submit-button"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "home-checkin-submit-button"

# 閉じるためにホームへ
- scrollUntilVisible:
    element:
      id: "home-checkin-button"
    direction: UP
    timeout: 10000
- tapOn:
    id: "home-checkin-button"
- waitForAnimationToEnd:
    timeout: 3000
