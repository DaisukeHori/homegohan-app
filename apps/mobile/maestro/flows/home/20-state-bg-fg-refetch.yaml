appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_10_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_10_PASSWORD}
---
# 20: 状態遷移 - BG→FG でデータが refetch されること
- runFlow: ../_shared/login.yaml
- assertVisible:
    id: "home-screen"
# バックグラウンドに移行
- pressKey: Home
- wait: 3000
# フォアグラウンドに戻す
- launchApp
    clearState: false
# ホーム画面が表示されデータが再取得されること
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
- assertVisible:
    id: "home-screen"
# ローディングインジケーターが表示された後にデータが表示されること
- extendedWaitUntil:
    notVisible:
      id: "home-loading-indicator"
    timeout: 15000
- assertVisible:
    id: "home-meals-section"
