appId: com.homegohan.app
---
# 05-existing-session-resume: 既存セッションを再開 → 会話履歴が表示される

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成してメッセージを送信
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

- tapOn:
    id: "ai-chat-input"
- inputText: "冷蔵庫にある材料でできる料理を教えてください"

- tapOn:
    id: "ai-chat-send-button"

# ストリーミング完了を待機
- extendedWaitUntil:
    notVisible:
      id: "ai-chat-streaming-view"
    timeout: 60000

# 一覧に戻る
- tapOn:
    text: "戻る"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# セッション一覧にセッションが表示されていることを確認
- assertVisible:
    id: "ai-session-item-0"

# 既存セッションをタップして再開
- tapOn:
    id: "ai-session-item-0"

# チャット画面が表示されるまで待機
- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# 以前送信したメッセージが表示されていることを確認
- assertVisible: "冷蔵庫にある材料でできる料理を教えてください"
