appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 02-text-send-streaming: テキスト送信 → ストリーミング応答が表示される

- runFlow: ../_shared/login.yaml

# AI相談へ移動 (ホーム画面のフローティングボタン)
- tapOn:
    id: "home-ai-fab"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# テキストを入力
- tapOn:
    id: "ai-chat-input"
- inputText: "今日の夕食のおすすめを教えてください"

# 送信ボタンをタップ
- tapOn:
    id: "ai-chat-send-button"

# 送信後に応答 (ストリーミングまたはエラー) が表示されるのを待つ
- waitForAnimationToEnd:
    timeout: 15000

# チャット画面に留まっていることを確認
- assertVisible:
    id: "ai-chat-screen"
