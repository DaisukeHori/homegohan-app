appId: com.homegohan.app
---
# 23-image-attach-bg-fg: 画像添付後にBG→FG復帰 → 添付画像が保持される

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# 画像添付ボタンをタップ
- tapOn:
    id: "ai-chat-image-attach-button"

# フォトライブラリが表示されるまで待機
- waitForAnimationToEnd:
    timeout: 5000

# 画像を選択
- tapOn:
    point: "10%, 30%"

# 画像が添付されていることを確認 (入力欄に画像プレビューが表示される)
- waitForAnimationToEnd:
    timeout: 3000

# アプリをバックグラウンドへ
- pressKey: Home

- waitForAnimationToEnd:
    timeout: 3000

# アプリをフォアグラウンドへ復帰
- launchApp
    clearState: false

# チャット画面に戻っていることを確認
- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# 添付画像が保持されていることを確認 (画像添付ボタンまたは入力欄に添付状態が残っている)
- assertVisible:
    id: "ai-chat-image-attach-button"

# テキストを追加して送信
- tapOn:
    id: "ai-chat-input"
- inputText: "バックグラウンド復帰後の画像送信テスト"

- tapOn:
    id: "ai-chat-send-button"

# 正常に送信されることを確認
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "ai-chat-streaming-view"
      - visible:
          id: "ai-chat-error-text"
    timeout: 15000
