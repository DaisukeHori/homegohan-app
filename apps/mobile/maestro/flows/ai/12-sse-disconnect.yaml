appId: com.homegohan.app
---
# 12-sse-disconnect: SSE接続が切断されたとき → エラーメッセージまたは再試行UIが表示される

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# テキストを入力して送信
- tapOn:
    id: "ai-chat-input"
- inputText: "ストリーミングテスト"

- tapOn:
    id: "ai-chat-send-button"

# ストリーミング開始を確認
- extendedWaitUntil:
    visible:
      id: "ai-chat-streaming-view"
    timeout: 10000

# SSE切断をシミュレート: 機内モードを有効にしてから無効に戻す
- setAirplaneMode: true

- waitForAnimationToEnd:
    timeout: 3000

- setAirplaneMode: false

# エラーメッセージまたは再接続UIが表示されることを確認
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "ai-chat-error-text"
      - notVisible:
          id: "ai-chat-streaming-view"
    timeout: 20000

# チャット画面に留まっていることを確認 (クラッシュしていない)
- assertVisible:
    id: "ai-chat-screen"
