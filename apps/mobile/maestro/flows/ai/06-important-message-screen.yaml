appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 06-important-message-screen: 重要メッセージ画面が表示される
# NOTE: AI応答依存部分はスキップし、重要メッセージ一覧ボタンの確認のみ

- runFlow: ../_shared/login.yaml

# AI相談へ移動 (ホーム画面のフローティングボタン)
- tapOn:
    id: "home-ai-fab"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 重要メッセージボタンが表示されることを確認
- assertVisible:
    id: "ai-important-button"

# 重要メッセージ画面へ移動
- tapOn:
    id: "ai-important-button"

# 待機
- waitForAnimationToEnd:
    timeout: 5000

# 画面遷移後に何らかの画面が表示されることを確認
- assertVisible:
    id: "ai-sessions-screen"
    optional: true
