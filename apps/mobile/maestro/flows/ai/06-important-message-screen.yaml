appId: com.homegohan.app
---
# 06-important-message-screen: 重要メッセージ画面が表示される

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# 重要メッセージを含む応答を引き出すテキストを送信
- tapOn:
    id: "ai-chat-input"
- inputText: "アレルギーについて教えてください"

- tapOn:
    id: "ai-chat-send-button"

# ストリーミング完了を待機
- extendedWaitUntil:
    notVisible:
      id: "ai-chat-streaming-view"
    timeout: 60000

# メッセージ一覧が表示されていることを確認
- assertVisible:
    id: "ai-chat-screen"

# 最新メッセージをタップ (重要メッセージ画面へ遷移)
- tapOn:
    id: "ai-chat-message-0"

# 待機
- waitForAnimationToEnd:
    timeout: 5000
