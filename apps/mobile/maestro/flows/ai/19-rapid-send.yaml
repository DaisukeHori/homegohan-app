appId: com.homegohan.app
---
# 19-rapid-send: 送信を連打 → 二重送信が発生しない (送信中は送信ボタンが無効になる)

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# テキストを入力
- tapOn:
    id: "ai-chat-input"
- inputText: "送信連打テスト"

# 送信ボタンを連打 (3回)
- tapOn:
    id: "ai-chat-send-button"
- tapOn:
    id: "ai-chat-send-button"
    optional: true
- tapOn:
    id: "ai-chat-send-button"
    optional: true

# ストリーミングが1回のみ開始されることを確認
- extendedWaitUntil:
    visible:
      id: "ai-chat-streaming-view"
    timeout: 10000

# ストリーミング完了を待機
- extendedWaitUntil:
    notVisible:
      id: "ai-chat-streaming-view"
    timeout: 60000

# チャット画面に留まっていることを確認
- assertVisible:
    id: "ai-chat-screen"

# メッセージが1件のみ送信されていることを確認
# (連打により重複メッセージが生成されていないことをアサート)
- assertVisible: "送信連打テスト"
