appId: com.homegohan.app
---
# 16-text-sqli: SQLインジェクション文字列を送信 → 安全に処理される (エラーなし・クラッシュなし)

- runFlow: ../01-login.yaml

# AI相談タブへ移動
- tapOn:
    text: "AI相談"

- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成
- tapOn:
    id: "ai-new-session-button"

- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# SQLインジェクション文字列を入力
- tapOn:
    id: "ai-chat-input"
- inputText: "'; DROP TABLE sessions; --"

# 送信ボタンをタップ
- tapOn:
    id: "ai-chat-send-button"

# 正常に処理されるかエラーメッセージが表示されることを確認 (クラッシュしない)
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "ai-chat-streaming-view"
      - visible:
          id: "ai-chat-error-text"
    timeout: 15000

# チャット画面に留まっていることを確認
- assertVisible:
    id: "ai-chat-screen"

# ストリーミングが発生した場合は完了を待機
- extendedWaitUntil:
    notVisible:
      id: "ai-chat-streaming-view"
    timeout: 60000

# アプリがクラッシュしていないことを確認
- assertVisible:
    id: "ai-chat-screen"
