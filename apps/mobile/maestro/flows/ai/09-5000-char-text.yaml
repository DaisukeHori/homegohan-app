- tapOn:
    id: "ai-chat-send-button"

# 正常に送信されるかエラーが表示されることを確認
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "ai-chat-streaming-view"
      - visible:
          id: "ai-chat-error-text"
    timeout: 15000
