appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 01-new-session-greeting: 新規セッション → 挨拶メッセージが表示される

- runFlow: ../_shared/login.yaml

# AI相談へ移動 (ホーム画面のフローティングボタン)
- tapOn:
    id: "home-ai-fab"

# セッション一覧画面が表示されるまで待機
- extendedWaitUntil:
    visible:
      id: "ai-sessions-screen"
    timeout: 10000

# 新規セッション作成ボタンをタップ
- tapOn:
    id: "ai-new-session-button"

# チャット画面が表示されるまで待機
- extendedWaitUntil:
    visible:
      id: "ai-chat-screen"
    timeout: 10000

# 挨拶メッセージ (AIからの初期メッセージ) が表示されることを確認
- assertVisible:
    id: "ai-chat-screen"

# 入力欄が表示されることを確認
- assertVisible:
    id: "ai-chat-input"
