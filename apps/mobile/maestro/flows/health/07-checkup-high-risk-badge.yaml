appId: com.homegohan.app
---
# 正常 07: 健診 high リスクの項目に赤バッジが表示されること
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-health"
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# 健診画面へ遷移
- tapOn:
    id: "health-checkups-nav-button"
- extendedWaitUntil:
    visible:
      id: "health-checkups-screen"
    timeout: 10000

# 健診リストが表示されることを確認
- assertVisible:
    id: "health-checkups-screen"

# high リスクの赤バッジが表示されていること
- assertVisible:
    id: "health-checkups-risk-badge-high"
