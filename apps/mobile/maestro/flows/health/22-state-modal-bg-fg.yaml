appId: com.homegohan.app
---
# 状態遷移 22: モーダル開いた状態でバックグラウンド → フォアグラウンドに戻る
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-health"
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# クイック記録モーダルを開く
- tapOn:
    id: "health-quick-record-button"
- extendedWaitUntil:
    visible:
      id: "health-quick-modal"
    timeout: 5000
- assertVisible:
    id: "health-quick-modal"

# アプリをバックグラウンドに送る
- pressKey: Home

# 少し待機
- extendedWaitUntil:
    visible:
      id: "health-quick-modal"
    timeout: 1000

# アプリをフォアグラウンドに戻す
- openLink: "homegohan://"

# モーダルが再表示されること（または health 画面が表示されること）
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000
- assertVisible:
    id: "health-screen"
