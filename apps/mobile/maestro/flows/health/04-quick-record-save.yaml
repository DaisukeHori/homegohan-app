appId: com.homegohan.app
---
# 正常 04: 体重 65.5 + 気分 4 + 睡眠 3 を記録して保存
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-health"
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# クイック記録モーダルを開く
- tapOn:
    id: "health-quick-record-button"
- extendedWaitUntil:
    visible:
      id: "health-quick-modal"
    timeout: 5000

# 体重入力
- tapOn:
    id: "health-quick-weight-input"
- clearText
- inputText: "65.5"

# 気分スコア 4 を選択
- tapOn:
    id: "health-quick-mood-4"

# 睡眠スコア 3 を選択
- tapOn:
    id: "health-quick-sleep-3"

# 保存ボタンをタップ
- tapOn:
    id: "health-quick-save-button"

# モーダルが閉じてダッシュボードに戻ることを確認
- extendedWaitUntil:
    notVisible:
      id: "health-quick-modal"
    timeout: 10000
- assertVisible:
    id: "health-screen"
