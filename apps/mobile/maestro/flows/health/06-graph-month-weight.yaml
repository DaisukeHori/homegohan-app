appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 06: グラフ画面で期間=月・指標=体重を表示する
- runFlow: ../_shared/login.yaml

- assertVisible:
    id: "home-screen"
- tapOn:
    id: "home-health-card"

- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# グラフ画面へ遷移
- scroll
- tapOn:
    id: "health-graphs-button"
- extendedWaitUntil:
    visible:
      id: "health-graphs-screen"
    timeout: 10000

# 期間を「月」に切り替え
- tapOn:
    id: "health-graphs-period-month"

# 指標を「体重」に切り替え
- tapOn:
    id: "health-graphs-metric-weight"

# グラフが表示されることを確認
- extendedWaitUntil:
    visible:
      id: "health-graphs-screen"
    timeout: 5000
- assertVisible:
    id: "health-graphs-screen"
