appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 02: 日付カレンダーが表示されることを確認
- runFlow: ../_shared/login.yaml

- assertVisible:
    id: "home-screen"
- tapOn:
    id: "home-health-card"

- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# 日付カレンダーが表示されていること
- assertVisible:
    id: "health-day-calendar"

# ヘルス画面が正常に表示されていることを確認
- assertVisible:
    id: "health-screen"
