appId: com.homegohan.app
---
# 正常 02: 過去日付をタップして履歴を表示する
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-health"
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 10000

# カレンダーまたは日付セレクターから過去の日付をタップ
- tapOn:
    id: "health-date-selector"
- assertVisible:
    id: "health-date-picker"

# 1日前の日付を選択（前日ボタンまたはカレンダーセル）
- tapOn:
    id: "health-date-prev-button"
- extendedWaitUntil:
    visible:
      id: "health-screen"
    timeout: 5000

# 過去日付のデータが表示されることを確認
- assertVisible:
    id: "health-screen"
