appId: com.homegohan.app
---
- launchApp
- tapOn: { text: "ほめゴハン" }
- tapOn: { id: "tab-menus" }
- waitForAnimationToEnd
- tapOn: { id: "header-stats-btn" }
- assertVisible: { id: "stats-modal" }
- tapOn: { id: "stats-improve-btn" }
- assertVisible: { id: "improve-meal-modal" }
- tapOn: { id: "improve-meal-type-lunch" }  # 昼食を外す
- tapOn: { id: "improve-meal-type-dinner" }  # 夕食を外す
- tapOn: { id: "improve-meal-next-day-toggle" }
- tapOn: { id: "improve-meal-submit" }
# API 200 → モーダル close
- assertNotVisible: { id: "improve-meal-modal" }
