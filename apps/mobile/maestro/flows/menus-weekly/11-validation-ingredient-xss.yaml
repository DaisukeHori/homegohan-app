appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 11: バリデーション - メモフィールドに XSS ペイロード入力 → サニタイズ
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-request-button"
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-request-note-input"
- tapOn:
    id: "weekly-request-note-input"
- inputText: "<script>alert('xss')</script>トマト"
- tapOn:
    id: "weekly-request-submit-button"
# XSS が実行されず、アプリがクラッシュしないこと
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 15000
- assertVisible:
    id: "weekly-request-screen"
