appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_02_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_02_PASSWORD}
---
# 02: 正常 - 今週メニューがない場合の空状態表示
- runFlow: ../_shared/login.yaml
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- assertVisible:
    id: "menus-weekly-screen"
# メニューがない場合の空状態が表示されること
- assertVisible:
    id: "weekly-menu-empty-state"
- assertVisible:
    id: "weekly-menu-generate-button"
