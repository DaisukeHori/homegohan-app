appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_06_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_06_PASSWORD}
---
# 06: 正常 - AI 生成テーマ「和食」で週間メニューを生成する
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- tapOn:
    id: "weekly-menu-generate-button"
- extendedWaitUntil:
    visible:
      id: "ai-generate-modal"
    timeout: 8000
- assertVisible:
    id: "ai-generate-theme-input"
- tapOn:
    id: "ai-generate-theme-input"
- inputText: "和食"
- tapOn:
    id: "ai-generate-submit-button"
# AI 生成中のローディング表示
- extendedWaitUntil:
    visible:
      id: "ai-generate-loading"
    timeout: 5000
# 生成完了後にメニューが表示される
- extendedWaitUntil:
    visible:
      id: "weekly-menu-list"
    timeout: 60000
- assertVisible:
    id: "weekly-menu-list"
