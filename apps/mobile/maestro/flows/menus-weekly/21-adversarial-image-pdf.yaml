appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 21: Adversarial - PDF ファイルを選択するシナリオ
# NOTE: iOS ネイティブ画像ピッカーに testID がないため、PDF ファイル選択テスト不可
# weekly-request-fridge-photo-button が表示されることのみ確認
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-request-button"
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-request-fridge-photo-button"
