appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 25: 状態遷移 - ネット切断中の AI 生成 submit
# NOTE: toggleAirplaneMode は無効なコマンドのため (issue #640)、ネットワーク切断テスト不可
# リクエスト画面が正常に表示されることのみ確認
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-request-button"
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-request-note-input"
- tapOn:
    id: "weekly-request-note-input"
- inputText: "オフライン送信テスト"
- assertVisible:
    id: "weekly-request-submit-button"
