appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_05_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_05_PASSWORD}
---
# 25: 状態遷移 - ネット切断中に AI 生成 submit → オフラインエラー・入力保持
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- tapOn:
    id: "weekly-menu-generate-button"
- extendedWaitUntil:
    visible:
      id: "ai-generate-modal"
    timeout: 8000
- tapOn:
    id: "ai-generate-theme-input"
- inputText: "オフライン送信テスト"
# ネットワーク切断
- toggleAirplaneMode: true
- tapOn:
    id: "ai-generate-submit-button"
# オフラインエラーが表示されること
- extendedWaitUntil:
    visible:
      id: "ai-generate-offline-error"
    timeout: 15000
- assertVisible:
    id: "ai-generate-offline-error"
# 入力内容が保持されていること
- assertVisible:
    id: "ai-generate-modal"
# ネットワーク復元
- toggleAirplaneMode: false
# 再送信が可能なことを確認
- tapOn:
    id: "ai-generate-submit-button"
- extendedWaitUntil:
    visible:
      id: "ai-generate-loading"
    timeout: 10000
