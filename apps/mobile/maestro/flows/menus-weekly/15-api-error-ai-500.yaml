appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_05_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_05_PASSWORD}
---
# 15: API エラー - AI 生成 500 エラー時にエラーメッセージ表示
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- tapOn:
    id: "weekly-menu-generate-button"
- extendedWaitUntil:
    visible:
      id: "ai-generate-modal"
    timeout: 8000
- tapOn:
    id: "ai-generate-theme-input"
- inputText: "エラーテスト"
# ネットワーク切断して送信
- toggleAirplaneMode: true
- tapOn:
    id: "ai-generate-submit-button"
# エラーメッセージが表示されること
- extendedWaitUntil:
    visible:
      id: "ai-generate-error-message"
    timeout: 30000
- assertVisible:
    id: "ai-generate-error-message"
# モーダルが閉じずに残ること
- assertVisible:
    id: "ai-generate-modal"
- toggleAirplaneMode: false
