appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 01: 正常 - タブをタップして今週のメニューがある場合の表示確認
- runFlow: ../_shared/login.yaml
- assertVisible:
    id: "home-screen"
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-weekly-button"
- extendedWaitUntil:
    visible:
      id: "weekly-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-screen"
- assertVisible:
    id: "weekly-prev-button"
- assertVisible:
    id: "weekly-next-button"
