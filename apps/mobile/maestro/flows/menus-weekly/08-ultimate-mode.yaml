appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 08: 正常 - Ultimate モードトグルがリクエスト画面に表示されること
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-request-button"
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-request-screen"
- scroll
- assertVisible:
    id: "weekly-request-ultimate-toggle"
# Ultimate モードトグルをオン
- tapOn:
    id: "weekly-request-ultimate-toggle"
# submit ボタンが表示されること
- scroll
- assertVisible:
    id: "weekly-request-submit-button"
