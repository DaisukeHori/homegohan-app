appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_02_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_02_PASSWORD}
---
# 12: バリデーション - family_size 0 入力 → エラー
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- tapOn:
    id: "weekly-menu-generate-button"
- extendedWaitUntil:
    visible:
      id: "ai-generate-modal"
    timeout: 8000
- tapOn:
    id: "ai-generate-family-size-input"
- inputText: "0"
- tapOn:
    id: "ai-generate-submit-button"
# 0人はバリデーションエラー
- assertVisible:
    id: "ai-generate-family-size-error"
- assertNotVisible:
    id: "ai-generate-loading"
