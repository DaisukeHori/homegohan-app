appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 12: バリデーション - family_size 0 入力 → アプリがクラッシュしないこと
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-request-button"
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-request-family-size-input"
- tapOn:
    id: "weekly-request-family-size-input"
- eraseText: 10
- inputText: "0"
- tapOn:
    id: "weekly-request-submit-button"
# バリデーションエラーまたは処理後もアプリがクラッシュしないこと
- extendedWaitUntil:
    visible:
      id: "weekly-request-screen"
    timeout: 15000
- assertVisible:
    id: "weekly-request-screen"
