appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 03: 正常 - weekly カレンダーの日付タップで当日のメニューが展開される
# NOTE: E2E_USER_03 は onboarding 未完了のためテストデータ問題あり (issue #636)
# E2E_USER_01 で代替 (メニューデータがある前提)
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-screen"
    timeout: 10000
- tapOn:
    id: "menus-weekly-button"
- extendedWaitUntil:
    visible:
      id: "weekly-screen"
    timeout: 10000
- assertVisible:
    id: "weekly-screen"
# prev/next ボタンで日付ナビゲーションが動くことを確認
- assertVisible:
    id: "weekly-prev-button"
- assertVisible:
    id: "weekly-next-button"
- tapOn:
    id: "weekly-prev-button"
- extendedWaitUntil:
    visible:
      id: "weekly-screen"
    timeout: 5000
- tapOn:
    id: "weekly-next-button"
- extendedWaitUntil:
    visible:
      id: "weekly-screen"
    timeout: 5000
