appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_07_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_07_PASSWORD}
---
# 17: API エラー - meal toggle PATCH 失敗時にロールバック
- runFlow: ../_shared/login.yaml
- tapOn:
    id: "tab-menus"
- extendedWaitUntil:
    visible:
      id: "menus-weekly-screen"
    timeout: 10000
- tapOn:
    id: "weekly-date-today"
- extendedWaitUntil:
    visible:
      id: "daily-menu-detail"
    timeout: 8000
- assertVisible:
    id: "weekly-meal-item-0-incomplete"
# ネットワーク切断
- toggleAirplaneMode: true
# toggle タップ (楽観的更新)
- tapOn:
    id: "weekly-meal-item-0-toggle"
# API エラー → ロールバック
- extendedWaitUntil:
    visible:
      id: "meal-toggle-error-toast"
    timeout: 15000
- assertVisible:
    id: "weekly-meal-item-0-incomplete"
- toggleAirplaneMode: false
