appId: com.homegohan.app
---
# 02-week-start-switch: 週開始日を日曜→月曜に切り替える (正常系)
- launchApp:
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 設定画面へ移動
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "settings-screen"

# 週開始日を月曜日に切り替え
- tapOn:
    id: "settings-week-start-monday"
- assertVisible:
    id: "settings-week-start-monday"

# 日曜日に戻す
- tapOn:
    id: "settings-week-start-sunday"
- assertVisible:
    id: "settings-week-start-sunday"
