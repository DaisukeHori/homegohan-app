appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 01-notification-toggle-on: 通知 toggle を ON にする (正常系)
- runFlow: ../_shared/login.yaml

# 設定画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "profile-settings-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "profile-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# 通知 toggle を ON にする
- tapOn:
    id: "settings-notifications-toggle"
- assertVisible:
    id: "settings-notifications-toggle"
