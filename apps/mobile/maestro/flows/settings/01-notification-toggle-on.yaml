appId: com.homegohan.app
---
# 01-notification-toggle-on: 通知 toggle を ON にする (正常系)
- launchApp:
    clearState: true
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 設定画面へ移動
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "settings-screen"

# 通知 toggle を ON にする
- tapOn:
    id: "settings-notifications-toggle"
- assertVisible:
    id: "settings-notifications-toggle"
- assertTrue:
    id: "settings-notifications-toggle"
    enabled: true
