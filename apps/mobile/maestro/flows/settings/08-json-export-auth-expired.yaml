appId: com.homegohan.app
---
# 08-json-export-auth-expired: JSON export 時に認証切れが発生した場合 (API 異常系)
- launchApp
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 設定画面へ移動
- tapOn:
    id: "tab-settings"
- assertVisible:
    id: "settings-screen"

# 認証トークンを無効化するため clearKeychain を実行してから export をタップ
- clearKeychain
- tapOn:
    id: "settings-export-json-row"

# 認証エラーによりウェルカム画面にリダイレクトされるか、エラートーストが表示される
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "welcome-screen"
      - visible:
          id: "auth-expired-error-toast"
    timeout: 15000
