appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 04-export-csv: CSV エクスポートを実行する (正常系)
- runFlow: ../_shared/login.yaml

# 設定画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "profile-settings-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "profile-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# CSV エクスポートをタップ
- scrollUntilVisible:
    element:
      id: "settings-export-csv-row"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "settings-export-csv-row"

# エクスポート後に完了ダイアログまたはシェアシートが表示される
- waitForAnimationToEnd:
    timeout: 15000

# シェアシートが表示された場合、ホームボタンでシステムに戻る
- pressKey: Home

- waitForAnimationToEnd:
    timeout: 2000

# アプリに戻る
- launchApp:
    stopApp: false

# アプリが引き続き動作していることを確認
- waitForAnimationToEnd:
    timeout: 3000
