appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 10-account-delete-rapid-tap: アカウント削除ボタンを連打しても二重実行されない (Adversarial)
- runFlow: ../_shared/login.yaml

# 設定画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "profile-settings-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "profile-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# アカウント設定行をタップ
- scrollUntilVisible:
    element:
      id: "settings-account-row"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "settings-account-row"

# アカウント設定画面が表示されることを確認
- waitForAnimationToEnd:
    timeout: 5000

# 戻る
- tapOn:
    point: "5%, 10%"

# 設定画面に戻っていることを確認
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
