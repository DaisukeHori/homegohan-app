appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 12-notification-toggle-bg-fg: 通知 toggle 中にバックグラウンド→フォアグラウンドしても状態が保持される (状態遷移)
- runFlow: ../_shared/login.yaml

# 設定画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "profile-settings-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "profile-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# 通知 toggle をタップ
- tapOn:
    id: "settings-notifications-toggle"

# アプリをバックグラウンドに移動
- pressKey: Home

- waitForAnimationToEnd:
    timeout: 3000

# フォアグラウンドに戻す
- launchApp:
    stopApp: false

# 設定画面に戻っていることを確認
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000

# toggle の状態が維持されていることを確認
- assertVisible:
    id: "settings-notifications-toggle"
