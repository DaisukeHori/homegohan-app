appId: com.homegohan.app
---
# 05-logout: ログアウトを実行する (正常系)
- launchApp
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 設定画面へ移動
- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "profile-screen"
- tapOn:
    id: "profile-settings-button"
- assertVisible:
    id: "settings-screen"

# ログアウトボタンをタップ
- tapOn:
    id: "settings-logout-button"

# 確認モーダルが表示される
- assertVisible:
    id: "settings-logout-confirm-modal"

# 確認ボタンをタップしてログアウト
- tapOn:
    id: "settings-logout-confirm-button"

# ウェルカム画面に戻ることを確認
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 10000
