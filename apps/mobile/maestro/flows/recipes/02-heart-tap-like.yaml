appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 02-heart-tap-like: 正常系 - ハートタップでお気に入り登録
- runFlow: ../_shared/login.yaml

# ホーム画面からレシピへ移動
- assertVisible:
    id: "home-screen"
- scroll
- tapOn:
    id: "home-recipes-button"

- extendedWaitUntil:
    visible:
      id: "recipes-screen"
    timeout: 10000

# レシピが表示されるまで待機（空でない場合のみいいねテスト）
- runFlow:
    when:
      visible:
        id: "recipes-like-.*"
    commands:
      # ハートボタンをタップ（regex で最初のアイテムのいいねボタン）
      - tapOn:
          id: "recipes-like-.*"
      # アニメーション待機
      - waitForAnimationToEnd:
          timeout: 3000
      # アプリがクラッシュしないことを確認
      - assertVisible:
          id: "recipes-screen"

# 画面が正常に表示されていることを確認
- assertVisible:
    id: "recipes-screen"
