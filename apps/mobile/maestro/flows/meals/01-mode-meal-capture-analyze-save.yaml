appId: com.homegohan.app
---
# 正常 01: mode=meal → 撮影 → AI解析 → 保存
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meals-screen"

- tapOn:
    id: "meals-add-button"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-meal"

- tapOn:
    id: "camera-capture-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "meal-form-screen"
    timeout: 30000

- assertVisible:
    id: "meal-name-input"
- assertVisible:
    id: "meal-calories-input"

- tapOn:
    id: "meal-save-button"
- extendedWaitUntil:
    visible:
      id: "meals-screen"
    timeout: 10000
- assertVisible:
    id: "meal-list"
