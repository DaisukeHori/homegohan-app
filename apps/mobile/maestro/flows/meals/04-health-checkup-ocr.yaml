appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 04: health_checkup OCR
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-health-checkup"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "ocr-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "health-checkup-form-screen"
    timeout: 30000

- assertVisible:
    id: "checkup-result-fields"

- tapOn:
    id: "checkup-save-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
