appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# API エラー 14: AI 解析 500 エラー
- runFlow: ../_shared/login.yaml

- setLocation:
    latitude: 0
    longitude: 0

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-meal"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "ai-analyze-error-message"
    timeout: 30000

- assertVisible:
    id: "ai-analyze-retry-button"
- assertNotVisible:
    id: "meal-form-screen"
