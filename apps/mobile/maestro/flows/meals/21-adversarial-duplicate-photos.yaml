appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# Adversarial 21: 同一写真 5 連発
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"

- repeat:
    times: 5
    commands:
      - tapOn:
          id: "tab-meals"
      - tapOn:
          id: "meal-mode-meal"
      - tapOn:
          id: "meal-capture-start-button"
      - tapOn:
          id: "meal-gallery-button"
      - extendedWaitUntil:
          visible:
            id: "gallery-picker-screen"
          timeout: 10000
      - tapOn:
          id: "gallery-first-photo"
      - extendedWaitUntil:
          visible:
            id: "meal-form-screen"
          timeout: 30000
      - tapOn:
          id: "meal-save-button"
      - extendedWaitUntil:
          visible:
            id: "home-screen"
          timeout: 10000

