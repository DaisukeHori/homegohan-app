appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# バリデーション 13: ギャラリー権限拒否
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-meal"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-gallery-button"

- assertVisible:
    id: "permission-request-dialog"
- tapOn:
    id: "permission-deny-button"

- assertVisible:
    id: "gallery-permission-denied-message"
- assertNotVisible:
    id: "gallery-picker-screen"
