appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# バリデーション 11: カロリー負値を入力
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-manual"
- assertVisible:
    id: "meal-form-screen"

- tapOn:
    id: "meal-name-input"
- inputText: "テスト料理"

- tapOn:
    id: "meal-calories-input"
- inputText: "-100"

- tapOn:
    id: "meal-save-button"

- assertVisible:
    id: "meal-calories-error"
