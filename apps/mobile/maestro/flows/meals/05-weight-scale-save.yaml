appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 05: weight_scale 体重保存
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-weight-scale"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "ocr-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "weight-form-screen"
    timeout: 30000

- assertVisible:
    id: "weight-value-input"

- tapOn:
    id: "weight-save-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
