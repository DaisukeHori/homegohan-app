appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# Adversarial 23: favorites 検索 SQL injection
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-favorites"
- assertVisible:
    id: "favorites-screen"

- tapOn:
    id: "favorites-search-input"
- inputText: "' OR '1'='1"

- extendedWaitUntil:
    visible:
      id: "favorites-list"
    timeout: 5000

- assertNotVisible:
    id: "favorites-sql-error"
- assertNotVisible:
    id: "app-crash-screen"
