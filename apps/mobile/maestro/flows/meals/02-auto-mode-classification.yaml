appId: com.homegohan.app
---
# 正常 02: auto モード → 正しく分類される
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meals-screen"

- tapOn:
    id: "meals-add-button"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-auto"

- tapOn:
    id: "camera-capture-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "meal-form-screen"
    timeout: 30000

- assertVisible:
    id: "meal-type-badge"
- assertNotVisible:
    id: "meal-type-unknown"

- tapOn:
    id: "meal-save-button"
- extendedWaitUntil:
    visible:
      id: "meals-screen"
    timeout: 10000
