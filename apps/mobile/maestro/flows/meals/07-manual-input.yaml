appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 07: manual 手動入力で食事保存
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-manual"
- assertVisible:
    id: "meal-form-screen"

- tapOn:
    id: "meal-name-input"
- inputText: "テスト定食"

- tapOn:
    id: "meal-calories-input"
- inputText: "650"

- tapOn:
    id: "meal-save-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
