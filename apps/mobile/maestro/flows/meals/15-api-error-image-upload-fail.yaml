appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# API エラー 15: image upload 失敗
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-meal"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "image-upload-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "image-upload-error-message"
    timeout: 30000

- assertVisible:
    id: "image-upload-retry-button"
- assertNotVisible:
    id: "meal-form-screen"
