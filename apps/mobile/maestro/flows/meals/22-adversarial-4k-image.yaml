appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# Adversarial 22: 4K 画像アップロード
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-meal"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-gallery-button"
- extendedWaitUntil:
    visible:
      id: "gallery-picker-screen"
    timeout: 10000

- tapOn:
    id: "gallery-4k-photo"

- extendedWaitUntil:
    visible:
      id: "image-upload-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "meal-form-screen"
    timeout: 60000

- tapOn:
    id: "meal-save-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
