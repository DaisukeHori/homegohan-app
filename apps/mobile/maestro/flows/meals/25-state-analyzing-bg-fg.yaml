appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 状態遷移 25: analyzing 中 BG→FG 復帰
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-meal"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- pressKey: Home
- pause:
    milliseconds: 2000

- openLink: "homegohan://"
- extendedWaitUntil:
    visible:
      id: "meal-form-screen"
    timeout: 30000

- assertVisible:
    id: "meal-name-input"
