appId: com.homegohan.app
---
# 正常 06: gallery 既存写真から食事登録
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meals-screen"

- tapOn:
    id: "meals-add-button"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-meal"

- tapOn:
    id: "camera-gallery-button"
- extendedWaitUntil:
    visible:
      id: "gallery-picker-screen"
    timeout: 10000

- tapOn:
    id: "gallery-first-photo"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "meal-form-screen"
    timeout: 30000

- tapOn:
    id: "meal-save-button"
- extendedWaitUntil:
    visible:
      id: "meals-screen"
    timeout: 10000
