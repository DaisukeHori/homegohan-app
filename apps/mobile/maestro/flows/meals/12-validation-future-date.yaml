appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# バリデーション 12: 未来日付で保存試行
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-manual"
- assertVisible:
    id: "meal-form-screen"

- tapOn:
    id: "meal-name-input"
- inputText: "未来の食事"

- tapOn:
    id: "meal-calories-input"
- inputText: "500"

- tapOn:
    id: "meal-date-input"
- assertVisible:
    id: "date-picker"

- tapOn:
    id: "date-picker-future-date"

- tapOn:
    id: "meal-save-button"

- assertVisible:
    id: "meal-date-error"
