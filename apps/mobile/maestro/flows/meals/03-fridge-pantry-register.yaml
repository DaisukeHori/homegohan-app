appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 正常 03: fridge → pantry 登録
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-fridge"
- tapOn:
    id: "meal-capture-start-button"

- tapOn:
    id: "meal-camera-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "pantry-item-form-screen"
    timeout: 30000

- assertVisible:
    id: "pantry-item-name-input"

- tapOn:
    id: "pantry-save-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000
