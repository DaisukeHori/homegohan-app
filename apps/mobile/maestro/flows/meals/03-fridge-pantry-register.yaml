appId: com.homegohan.app
---
# 正常 03: fridge → pantry 登録
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- assertVisible:
    id: "meals-screen"

- tapOn:
    id: "meals-add-button"
- assertVisible:
    id: "meal-mode-select-screen"

- tapOn:
    id: "meal-mode-fridge"

- tapOn:
    id: "camera-capture-button"
- extendedWaitUntil:
    visible:
      id: "ai-analyzing-indicator"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "pantry-item-form-screen"
    timeout: 30000

- assertVisible:
    id: "pantry-item-name-input"

- tapOn:
    id: "pantry-save-button"
- extendedWaitUntil:
    visible:
      id: "meals-screen"
    timeout: 10000
