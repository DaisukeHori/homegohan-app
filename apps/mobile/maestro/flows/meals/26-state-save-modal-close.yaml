appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 状態遷移 26: 保存後 modal 閉じ確認
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-manual"
- assertVisible:
    id: "meal-form-screen"

- tapOn:
    id: "meal-name-input"
- inputText: "モーダルテスト"

- tapOn:
    id: "meal-calories-input"
- inputText: "400"

- tapOn:
    id: "meal-save-button"

- extendedWaitUntil:
    visible:
      id: "meal-save-success-message"
    timeout: 10000

- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 5000

- assertNotVisible:
    id: "meal-form-screen"
