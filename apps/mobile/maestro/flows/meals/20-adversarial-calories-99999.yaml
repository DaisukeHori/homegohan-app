appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# Adversarial 20: カロリー 99999 極端な値
- runFlow: ../_shared/login.yaml

- tapOn:
    id: "tab-meals"
- tapOn:
    id: "meal-mode-manual"
- assertVisible:
    id: "meal-form-screen"

- tapOn:
    id: "meal-name-input"
- inputText: "極端カロリー料理"

- tapOn:
    id: "meal-calories-input"
- inputText: "99999"

- tapOn:
    id: "meal-save-button"

- assertVisible:
    id: "meal-calories-error"
