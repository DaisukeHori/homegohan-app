appId: com.homegohan.app
---
# _shared/logout.yaml: タブバーのプロファイルタブ → 設定 → ログアウトの共通フロー
# 前提: ホーム画面または任意の画面 (タブバーが見える状態)
# LogBox.ignoreAllLogs() 適用後はバナー閉じ処理は不要
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 15000
- scroll
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: "profile-settings-button"
- extendedWaitUntil:
    visible:
      id: "settings-screen"
    timeout: 10000
- scrollUntilVisible:
    element:
      id: "settings-logout-button"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "settings-logout-button"
- extendedWaitUntil:
    visible:
      id: "settings-logout-confirm-button"
    timeout: 5000
- tapOn:
    id: "settings-logout-confirm-button"
- extendedWaitUntil:
    visible:
      id: "welcome-screen"
    timeout: 10000
