appId: com.homegohan.app
---
# _shared/login.yaml: 既存ユーザーでログインしてホーム画面まで遷移する共通フロー
- launchApp
- assertVisible:
    text: "ほめゴハン"
- tapOn:
    text: "ログイン"
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 10000
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000
