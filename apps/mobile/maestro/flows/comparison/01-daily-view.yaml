appId: com.homegohan.app
---
# 01-daily-view: 比較画面で日次ビューを表示する (正常系)
- launchApp:
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 比較画面へ移動
- tapOn:
    id: "tab-comparison"
- assertVisible:
    id: "comparison-screen"

# 日次ピリオドを選択
- tapOn:
    id: "comparison-period-daily"
- assertVisible:
    id: "comparison-period-daily"

# ランキングアイテムが表示される
- extendedWaitUntil:
    visible:
      id: "comparison-ranking-item-0"
    timeout: 10000
