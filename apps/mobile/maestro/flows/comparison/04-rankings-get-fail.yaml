appId: com.homegohan.app
---
# 04-rankings-get-fail: rankings GET API が失敗した場合のエラー表示 (API 異常系)
- launchApp
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# ネットワークをオフライン状態にする
- setAirplaneMode: true

# 比較画面へ移動
- tapOn:
    id: "tab-comparison"
- assertVisible:
    id: "comparison-screen"

# エラー状態が表示される
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "comparison-error-message"
      - visible:
          id: "comparison-network-error-toast"
    timeout: 15000

# ネットワークを復旧
- setAirplaneMode: false

# リトライが可能な状態であることを確認
- assertVisible:
    id: "comparison-retry-button"
