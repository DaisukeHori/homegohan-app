appId: com.homegohan.app
---
# 02-weekly-switch: 比較画面で週次ビューに切り替える (正常系)
- launchApp:
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# 比較画面へ移動
- tapOn:
    id: "tab-comparison"
- assertVisible:
    id: "comparison-screen"

# 日次→週次に切り替え
- tapOn:
    id: "comparison-period-daily"
- tapOn:
    id: "comparison-period-weekly"
- assertVisible:
    id: "comparison-period-weekly"

# ランキングアイテムが表示される
- extendedWaitUntil:
    visible:
      id: "comparison-ranking-item-0"
    timeout: 10000
