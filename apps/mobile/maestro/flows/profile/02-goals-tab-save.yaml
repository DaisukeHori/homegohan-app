appId: com.homegohan.app
---
# 02-goals-tab-save: プロフィール目標タブの情報を保存する (正常系)
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# プロフィール画面へ移動
- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "profile-screen"

# 目標タブを選択
- tapOn:
    id: "profile-tab-goals"
- assertVisible:
    id: "profile-tab-goals"

# 目標体重を入力 (65.0 kg)
- tapOn:
    id: "profile-goal-weight-input"
- clearText
- inputText: "65.0"

# 保存ボタンをタップ
- tapOn:
    id: "profile-save-button"
- extendedWaitUntil:
    visible:
      id: "profile-save-success-toast"
    timeout: 10000
