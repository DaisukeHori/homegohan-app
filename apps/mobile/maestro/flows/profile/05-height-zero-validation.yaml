appId: com.homegohan.app
---
# 05-height-zero-validation: 身長に 0 を入力した場合のバリデーションエラー (バリデーション)
- launchApp
# 前の状態をリセット (ホーム or Admin Console にいる場合)
- runFlow:
    file: "../_shared/ensure-welcome.yaml"
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# プロフィール画面へ移動
- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "profile-screen"

# 基本タブを選択
- tapOn:
    id: "profile-tab-basic"

# 身長に 0 を入力
- tapOn:
    id: "profile-height-input"
- clearText
- inputText: "0"

# 保存ボタンをタップ
- tapOn:
    id: "profile-save-button"

# バリデーションエラーが表示される
- assertVisible:
    id: "profile-height-error-message"

# 保存成功トーストは表示されない
- assertNotVisible:
    id: "profile-save-success-toast"
