appId: com.homegohan.app
---
# 08-nickname-xss-adversarial: ニックネームに XSS ペイロードを入力してもサニタイズされる (Adversarial)
- launchApp:
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# プロフィール画面へ移動
- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "profile-screen"

# 基本タブを選択
- tapOn:
    id: "profile-tab-basic"

# XSS ペイロードを入力
- tapOn:
    id: "profile-nickname-input"
- clearText
- inputText: "<script>alert('xss')</script>"

# 保存ボタンをタップ
- tapOn:
    id: "profile-save-button"

# エラーまたは保存成功 (サニタイズして保存) が発生する
- extendedWaitUntil:
    anyOf:
      - visible:
          id: "profile-save-success-toast"
      - visible:
          id: "profile-nickname-error-message"
    timeout: 10000

# スクリプトタグがそのまま表示されていないことを確認
- assertNotVisible:
    text: "<script>"
