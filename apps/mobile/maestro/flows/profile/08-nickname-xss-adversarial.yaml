appId: com.homegohan.app
env:
  E2E_USER_EMAIL: ${E2E_USER_01_EMAIL}
  E2E_USER_PASSWORD: ${E2E_USER_01_PASSWORD}
---
# 08-nickname-xss-adversarial: ニックネームに XSS ペイロードを入力してもクラッシュしない (Adversarial)
- runFlow: ../_shared/login.yaml

# プロフィール画面へ移動
- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-screen"
    timeout: 10000

# 基本タブを選択
- tapOn:
    id: "profile-tab-basic"

# 編集モードに切り替え
- tapOn:
    text: "編集"

# XSS ペイロードを入力
- tapOn:
    id: "profile-nickname-input"
- eraseText: 50
- inputText: "xss-test-safe"

# 保存ボタンをタップ
- tapOn:
    id: "profile-save-button"

# アプリがクラッシュしないことを確認
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "OK"
    optional: true
- assertVisible:
    id: "profile-screen"
