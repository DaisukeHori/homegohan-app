appId: com.homegohan.app
---
# 01-basic-tab-save: プロフィール基本タブの情報を保存する (正常系)
- launchApp:
- assertVisible:
    id: "welcome-screen"
- tapOn:
    id: "welcome-login-button"
- tapOn:
    id: "email-input"
- inputText: ${E2E_USER_01_EMAIL}
- tapOn:
    id: "password-input"
- inputText: ${E2E_USER_01_PASSWORD}
- tapOn:
    id: "login-button"
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 10000

# プロフィール画面へ移動
- tapOn:
    id: "tab-profile"
- assertVisible:
    id: "profile-screen"

# 基本タブを選択
- tapOn:
    id: "profile-tab-basic"
- assertVisible:
    id: "profile-tab-basic"

# ニックネームを入力
- tapOn:
    id: "profile-nickname-input"
- clearText
- inputText: "テストユーザー01"

# 保存ボタンをタップ
- tapOn:
    id: "profile-save-button"
- extendedWaitUntil:
    visible:
      id: "profile-save-success-toast"
    timeout: 10000
