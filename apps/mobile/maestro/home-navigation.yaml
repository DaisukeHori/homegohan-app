appId: com.homegohan.app
---
# ホーム / タブナビゲーションの E2E フロー
# 前提: アプリがログイン済み状態で起動できること

- launchApp

# ── ホーム画面が表示されることを確認 ──────────────────────────────────────────
- assertVisible: "ホーム"
# ヒーローセクションの挨拶テキスト (日本語のいずれか)
- assertVisible:
    text: ".*さん"
    regexp: true

# ── 献立タブをタップ ─────────────────────────────────────────────────────────
- tapOn: "献立"
- assertVisible: "献立"

# ── お気に入りタブをタップ ───────────────────────────────────────────────────
- tapOn: "お気に入り"
- assertVisible: "お気に入り"

# ── 比較タブをタップ ─────────────────────────────────────────────────────────
- tapOn: "比較"
- assertVisible: "比較"

# ── マイページタブをタップ ───────────────────────────────────────────────────
- tapOn: "マイページ"
- assertVisible: "マイページ"

# ── ホームに戻る ─────────────────────────────────────────────────────────────
- tapOn: "ホーム"
- assertVisible: "今日の進捗"
