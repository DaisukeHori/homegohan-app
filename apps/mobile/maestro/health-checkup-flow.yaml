appId: com.homegohan.app
---
# 健康診断フロー — 新規記録の作成から AI 分析結果確認まで
# 実行前提: ログイン済みユーザーで アプリが起動していること

- launchApp

# ── ホームから健康タブへ ──────────────────────────────────
- tapOn:
    text: "健康"

# ── 健康トップ画面 ────────────────────────────────────────
- assertVisible: "健康"

# ── 健康診断記録画面へ ────────────────────────────────────
- tapOn:
    text: "健康診断"

- assertVisible: "健康診断記録"

# ── 新規記録ボタン (+) を押す ────────────────────────────
- tapOn:
    id: ".*add.*"

- assertVisible: "健康診断を記録"

# ── 基本情報を入力 ───────────────────────────────────────
# 検査日はデフォルト値 (今日) がすでに入っている
- tapOn:
    text: "定期健診"

# 医療機関名を入力
- tapOn:
    placeholder: "〇〇クリニック"
- inputText: "テストクリニック"

# ── 血圧・代謝セクションを入力 ──────────────────────────
- tapOn:
    placeholder: "120"
- inputText: "125"

- tapOn:
    placeholder: "80"
- inputText: "78"

- tapOn:
    placeholder: "5.6"
- inputText: "5.8"

# ── 身体測定を入力 ──────────────────────────────────────
- tapOn:
    placeholder: "170"
- inputText: "172"

- tapOn:
    placeholder: "65"
- inputText: "68"

# ── 保存して AI 分析を実行 ──────────────────────────────
- scrollToBottom
- tapOn:
    text: "保存してAI分析を実行"

# ── AI 分析結果画面の確認 ───────────────────────────────
- assertVisible:
    text: "AI分析結果"
    timeout: 10000

# ── 完了ボタンで一覧に戻る ──────────────────────────────
- tapOn:
    text: "完了"

- assertVisible: "健康診断記録"
