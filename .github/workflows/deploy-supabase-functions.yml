name: Deploy Supabase Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
  workflow_dispatch: # 手動トリガー可能

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_PROJECT_ID: flmeolcfutuwwbjmzyoz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Edge Function dependency pinning
        run: |
          if rg -n '^\s*import(?:.+from\s+)?["'"'"'](?:jsr:|npm:)' supabase/functions --glob '*.ts'; then
            echo "Supabase Functions では raw jsr:/npm: import を使わず、supabase/functions/deno.json の exact pin alias を使ってください。"
            exit 1
          fi

      - name: Verify Supabase CLI version
        run: |
          npx --yes supabase@2.62.10 --version

      - name: Deploy all functions
        run: |
          npx --yes supabase@2.62.10 functions deploy --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify deployment
        run: |
          echo "Supabase Functions deployed successfully"
          npx --yes supabase@2.62.10 functions list --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
