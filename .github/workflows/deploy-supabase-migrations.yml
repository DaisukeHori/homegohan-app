name: Deploy Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  pull_request:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_PROJECT_ID: flmeolcfutuwwbjmzyoz

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify Supabase CLI version
        run: npx --yes supabase@2.62.10 --version

      - name: Link Supabase project
        run: |
          npx --yes supabase@2.62.10 link --project-ref ${{ env.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Lint migrations
        id: db_lint
        run: |
          LINT_OUTPUT=$(npx --yes supabase@2.62.10 db lint --linked --schema public 2>&1 || true)
          echo "lint_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LINT_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          {
            echo "## db lint 結果"
            echo ""
            echo "\`\`\`"
            echo "$LINT_OUTPUT"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Detect migration drift
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          npx --yes supabase@2.62.10 migration list --linked | tee /tmp/migration_list.txt
          python3 - <<'PY'
          import re
          import sys

          with open("/tmp/migration_list.txt", encoding="utf-8") as fh:
              lines = fh.readlines()

          drift = []
          for raw_line in lines:
              line = raw_line.rstrip("\n")
              # supabase CLI の pretty 出力は `|Local|Remote|Time (UTC)|` 形式で
              # 各行が "|" で始まり "|" で終わる。先頭/末尾のちょうど1個だけを
              # 取り除いてから分割しないと、空セル(local-only/remote-only 行)の
              # 位置がずれて誤検知・見逃しの原因になる。
              if not (line.startswith("|") and line.endswith("|")):
                  continue
              inner = line[1:-1]
              cols = [c.strip() for c in inner.split("|")]
              if len(cols) < 2:
                  continue
              local, remote = cols[0], cols[1]
              # ヘッダー行・区切り行 (LOCAL/REMOTE 文字列や ---- ) は除外し、
              # migration バージョン (数値) の行のみを対象にする
              if not (re.fullmatch(r"[0-9]*", local) and re.fullmatch(r"[0-9]*", remote)):
                  continue
              if local == "" and remote == "":
                  continue
              # 片方のみ埋まっている行 = remote-only または local-only のドリフト
              if (local == "") != (remote == ""):
                  drift.append(line)

          if drift:
              print("::error::Migration drift detected. See #1064.", file=sys.stderr)
              for line in drift:
                  print(line, file=sys.stderr)
              sys.exit(1)
          PY
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          npx --yes supabase@2.62.10 db push --linked --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify migration list
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          npx --yes supabase@2.62.10 migration list --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify db diff (post-apply)
        id: db_diff
        run: |
          DIFF=$(npx --yes supabase@2.62.10 db diff --linked --schema public 2>&1 || true)
          echo "diff_output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$DIFF" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Report db diff to PR comment (PR CI)
        if: steps.db_diff.outputs.has_diff == 'true' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DIFF_OUTPUT: ${{ steps.db_diff.outputs.diff_output }}
        run: |
          printf '## Warning: supabase db diff が空でありません (post-apply)\n\nmigration 適用後に以下の残留差分があります:\n\n```sql\n%s\n```\n\n意図しない差分がある場合は migration ファイルを見直してください。' \
            "$DIFF_OUTPUT" > /tmp/db_diff_comment.txt
          gh pr comment "$PR_NUMBER" --body-file /tmp/db_diff_comment.txt

      - name: Report db diff to Step Summary (main push)
        if: steps.db_diff.outputs.has_diff == 'true' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          DIFF_OUTPUT: ${{ steps.db_diff.outputs.diff_output }}
        run: |
          {
            echo "## Warning: supabase db diff が空でありません (post-apply)"
            echo ""
            echo "migration 適用後に以下の残留差分があります:"
            echo ""
            echo "\`\`\`sql"
            printf '%s\n' "$DIFF_OUTPUT"
            echo "\`\`\`"
            echo ""
            echo "意図しない差分がある場合は migration ファイルを見直してください。"
          } >> "$GITHUB_STEP_SUMMARY"
