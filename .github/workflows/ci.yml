name: CI
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # typecheck / lint / test は #1061 でベースラインを緑化済み。
      # 3 つとも blocking（このジョブの成否 = typecheck && lint && test）。
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
